name: Publish to PyPI

on:
  push:
    tags:
      - "ftw-tools-v*"

jobs:
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
          enable-cache: true
      - name: Build package
        run: uv build
      - name: Publish to PyPI
        run: uv publish --trusted-publishing always
