trainer:
  max_epochs: 3
  log_every_n_steps: 1
  accelerator: gpu
  default_root_dir: logs/FTW-Dev
  devices:
    - 0
  limit_train_batches: 16   # 16 batches × batch_size 4 = 64 samples/epoch
  limit_val_batches: 8
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: ftw-baselines
      name: dev-run
      log_model: false
      tags:
        - dev
  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: val_loss
        mode: min
        save_top_k: 0
        save_last: true
        filename: "{epoch}-{val_loss:.2f}"
model:
  class_path: ftw_tools.training.trainers.CustomSemanticSegmentationTask
  init_args:
    class_weights: [0.05, 0.20, 0.75]
    loss: "ce"
    model: "unet"
    backbone: "efficientnet-b3"
    weights: true
    patch_weights: false
    in_channels: 8
    num_classes: 3
    num_filters: 64
    ignore_index: 3
    lr: 1e-3
    patience: 100
data:
  class_path: ftw_tools.training.datamodules.FTWDataModule
  init_args:
    batch_size: 4
    num_workers: 2
    num_samples: 128       # limit training split to 128 samples
    random_shuffle: true
    train_countries:
      - austria
    val_countries:
      - austria
    test_countries:
      - austria
  dict_kwargs:
    root: data/ftw
    load_boundaries: true
    # brightness_aug: true
    resize_aug: true
    preprocess_aug: true
seed_everything: 7
