program: scripts/ftw_model_fit.py
project: ftw-baselines
command:
  - ${env}
  - uv
  - run
  - python
  - ${program}
  - ${args}
method: bayes
metric:
  name: val/loss
  goal: minimize
parameters:
  lr:
    distribution: log_uniform_values
    min: 1e-4
    max: 1e-2
  loss:
    values:
      - ce
      - logcoshdice
      - focal
  backbone:
    values:
      - resnet50
      - efficientnet-b5
  omega:
    values: [0.60, 0.75, 0.85]
